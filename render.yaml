services:
  - type: web
    name: docusign-mcp-demo
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DOCUSIGN_MCP_URL
        value: https://mcp-d.docusign.com/mcp
      - key: NODE_ENV
        value: production
